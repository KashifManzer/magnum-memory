<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="magnum-memory — memory for Claude Code that survives context compaction">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>

  <!-- icon: layered "memory cards" -->
  <g transform="translate(96,104)">
    <rect x="0"  y="40" width="150" height="112" rx="16" fill="#312e81" opacity="0.65"/>
    <rect x="20" y="20" width="150" height="112" rx="16" fill="#4338ca" opacity="0.85"/>
    <rect x="40" y="0"  width="150" height="112" rx="16" fill="url(#accent)"/>
    <!-- "memory" lines on the top card -->
    <rect x="62" y="28" width="108" height="11" rx="5.5" fill="#0f172a" opacity="0.55"/>
    <rect x="62" y="52" width="82"  height="11" rx="5.5" fill="#0f172a" opacity="0.45"/>
    <rect x="62" y="76" width="94"  height="11" rx="5.5" fill="#0f172a" opacity="0.45"/>
  </g>

  <!-- wordmark -->
  <text x="330" y="168" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="78" font-weight="700" fill="#f8fafc">magnum-memory</text>
  <rect x="334" y="190" width="300" height="6" rx="3" fill="url(#accent)"/>
  <text x="334" y="240" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="29" font-weight="400" fill="#a5b4fc">memory for Claude Code that survives context compaction</text>
</svg>
